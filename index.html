<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>パチンコ風連打演出</title>

<style>
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: #fff;
    font-family: sans-serif;
  }

  .container {
    position: relative;
    width: 640px;
    height: 360px;
  }

  video {
    width: 100%;
    height: 100%;
    background: #000;
  }

  .hidden {
    display: none;
  }

  .overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .button-area {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: auto;
    text-align: center;
  }

  .tap-button {
    width: 160px;
    height: 80px;
    background: url('botan.png') no-repeat center/cover;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  .gauge-wrapper {
    margin-top: 12px;
    width: 260px;
    height: 20px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid #888;
    margin-left: auto;
    margin-right: auto;
  }

  .gauge-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
    transition: width 0.05s linear;
  }

  .count-text {
    margin-top: 6px;
    font-size: 14px;
  }

  #startButton {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 14px 28px;
    font-size: 20px;
    background: #ff4444;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .tap-message {
    font-size: 28px;
    font-weight: bold;
    color: #ffdd44;
    text-shadow: 0 0 10px #ff4444, 0 0 20px #ff0000;
    margin-bottom: 10px;
    animation: blink 0.8s infinite;
  }

  @keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
  }
</style>
</head>

<body>
<div class="container">

  <!-- 再生ボタン -->
  <button id="startButton">▶ 再生</button>

  <!-- 一本目の前半 -->
  <video id="video1_part1" src="pachi1-1.mp4" class="hidden"></video>

  <!-- 一本目の後半 -->
  <video id="video1_part2" src="pachi1-2.mp4" class="hidden"></video>

  <!-- 二本目の動画 -->
  <video id="video2" src="pachi2.mp4" class="hidden"></video>

  <!-- 連打演出 -->
  <div id="overlay" class="overlay hidden">
    <div class="button-area">

      <div id="tapMessage" class="tap-message">アイコンを連打!!</div>

      <button id="tapButton" class="tap-button"></button>

      <div class="gauge-wrapper">
        <div id="gaugeBar" class="gauge-bar"></div>
      </div>

      <div id="countText" class="count-text">連打数: 0</div>
    </div>
  </div>

</div>

<script>
  const startButton = document.getElementById('startButton');
  const v1a = document.getElementById('video1_part1');
  const v1b = document.getElementById('video1_part2');
  const v2  = document.getElementById('video2');

  const overlay = document.getElementById('overlay');
  const tapButton = document.getElementById('tapButton');
  const gaugeBar = document.getElementById('gaugeBar');
  const countText = document.getElementById('countText');

  let tapCount = 0;
  let maxGauge = 100;

  /* 再生ボタン → 一本目前半を再生 */
  startButton.onclick = () => {
    startButton.classList.add('hidden');
    v1a.classList.remove('hidden');
    v1a.play();
  };

  /* 前半終了 → 後半へ */
  v1a.addEventListener('ended', () => {
    v1a.classList.add('hidden');
    v1b.classList.remove('hidden');
    v1b.play();
  });

  /* 後半終了 → 二本目へ */
  v1b.addEventListener('ended', () => {
    v1b.classList.add('hidden');
    v2.classList.remove('hidden');
    v2.play();
    startTapPhase(10000);
  });

  /* 連打演出 */
  function startTapPhase(durationMs) {
    tapCount = 0;
    updateGauge();

    overlay.classList.remove('hidden');

    const startTime = performance.now();

    tapButton.onclick = () => {
      const now = performance.now();
      if (now - startTime > durationMs) return;

      tapCount++;
      updateGauge();
    };

    setTimeout(() => {
      overlay.classList.add('hidden');
      tapButton.onclick = null;
      console.log("連打終了: ", tapCount);
    }, durationMs);
  }

  function updateGauge() {
    const gaugePercent = Math.min(tapCount * 2, maxGauge);
    gaugeBar.style.width = gaugePercent + "%";
    countText.textContent = "連打数: " + tapCount;
  }
</script>

</body>
</html>
